<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УБ Автобусны Чиглэл</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: Arial, sans-serif; overflow: hidden;
        }

        #map { width: 100%; height: 100%; z-index: 1; }

        .sidebar { 
            position: absolute; top: 0; left: -320px; width: 300px; height: 100%; 
            background-color: #1a1a1a; color: #ffffff; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); 
            transition: left 0.3s ease; z-index: 1000; 
            display: flex; flex-direction: column; 
        }

        .sidebar.active { left: 0; }

        .sidebar-header { 
            padding: 20px; background-color: #262626; 
            border-bottom: 1px solid #333; font-size: 1.2rem; font-weight: bold; 
        }

        .route-list { padding: 15px; overflow-y: auto; flex-grow: 1; }

        .route-item { 
            display: flex; align-items: center; margin-bottom: 12px; 
            cursor: pointer; font-size: 0.95rem; 
        }

        .route-item input { margin-right: 12px; transform: scale(1.2); cursor: pointer; }

        .toggle-btn { 
            position: absolute; top: 15px; left: 15px; z-index: 999; 
            background-color: #1a1a1a; color: white; border: 1px solid #333; 
            padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .toggle-btn:hover { background-color: #333333; }

        .sidebar.active + .toggle-btn { left: 315px; transition: left 0.3s ease; }

        .error-msg { color: #ff4d4d; padding: 10px; font-size: 0.9rem; }

        @media (max-width: 480px) { 
            .sidebar { width: 85%; left: -90%; }
            .sidebar.active + .toggle-btn { left: calc(85% + 15px); }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">Автобусны чиглэлүүд</div>
        <div class="route-list" id="route-list">Дата уншиж байна...</div>
    </div>

    <button class="toggle-btn" id="toggle-btn">☰ Цэс</button>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Газрын зургийг Улаанбаатар хотын төв дээр нээнэ
        const map = L.map('map').setView([47.9188, 106.9176], 13); 

        // 2. Хар Бараан (Dark Mode) загвар оруулах
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map); 

        const activeMarkers = {}; 
        let globalData = []; 

        const sidebar = document.getElementById('sidebar'); 
        const toggleBtn = document.getElementById('toggle-btn'); 
        const routeListContainer = document.getElementById('route-list'); 

        toggleBtn.addEventListener('click', () => { 
            sidebar.classList.toggle('active'); 
        });

        // 3. Файлыг шууд нэрээр нь дуудах
        fetch('UB_route_stations.json') 
            .then(response => {
                if (!response.ok) {
                    throw new Error('Файлыг олсонгүй (Статус: ' + response.status + ')');
                }
                return response.json(); 
            })
            .then(data => { 
                globalData = data; 
                routeListContainer.innerHTML = ''; 

                if (!Array.isArray(data) || data.length === 0) {
                    routeListContainer.innerHTML = '<div class="error-msg">Файл дотор дата алга байна.</div>';
                    return;
                }

                // 🌟 СҮҮЛИЙН ШИНЭЧЛЭЛ: Өгөгдөл доторх чиглэлийн нэрийг уян хатан хайх (routeAlias эсвэл route_alias)
                const sample = data[0];
                const aliasKey = ('routeAlias' in sample) ? 'routeAlias' : (('route_alias' in sample) ? 'route_alias' : null);
                const nameKey = ('routeName' in sample) ? 'routeName' : (('route_name' in sample) ? 'route_name' : aliasKey);

                if (!aliasKey) {
                    routeListContainer.innerHTML = '<div class="error-msg">JSON бүтцээс чиглэлийн нэр олдсонгүй.</div>';
                    return;
                }

                // Давтагдаагүй чиглэлүүдийг ялгаж авах
                const routes = [...new Set(data.map(item => item[aliasKey]).filter(Boolean))]; 
                routes.sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
                
                routes.forEach(route => { 
                    // 2. 🌟 ТУХАЙН ЧИГЛЭЛИЙН БҮТЭН НЭРИЙГ (routeName) ЖИШЭЭ БОЛГОЖ НЭГ ДАТАГААС НЬ ХАЙЖ ОЛОХ
                    const routeInfo = data.find(item => item.routeAlias === route);
                    const fullRouteName = routeInfo && routeInfo.routeName ? routeInfo.routeName : route;

                    const label = document.createElement('label'); 
                    label.className = 'route-item'; 
                    
                    const checkbox = document.createElement('input'); 
                    checkbox.type = 'checkbox'; 
                    checkbox.value = route; // Чекбокс ажиллахад код нь хэвээрээ байна
                    
                    // 3. 🌟 ДЭЛГЭЦЭНД ХАРАГДАХ ТЕКСТД БҮТЭН НЭРИЙГ НЬ ОНООЖ ӨГӨХ
                    const text = document.createTextNode(fullRouteName); 
                    
                    label.appendChild(checkbox); 
                    label.appendChild(text); 
                    routeListContainer.appendChild(label); 

                    checkbox.addEventListener('change', (e) => { 
                        if (e.target.checked) { 
                            showRouteStations(e.target.value, 'routeAlias', 'routeName'); 
                        } else { 
                            removeRouteStations(e.target.value); 
                        }
                    });
                });
            })
            .catch(error => { 
                console.error(error);
                routeListContainer.innerHTML = `<div class="error-msg">Алдаа: Датаг уншиж чадсангүй.<br>${error.message}</div>`;
            });

        // 4. Автобусны зогсоолуудыг зурах функц
        function showRouteStations(routeAlias, aliasKey, nameKey) { 
            const stations = globalData.filter(item => item[aliasKey] === routeAlias); 
            activeMarkers[routeAlias] = []; 

            // Олноор давтагдах талбаруудыг уян хатан шалгах
            const sample = globalData[0];
            const latKey = ('latitude' in sample) ? 'latitude' : 'lat';
            const lngKey = ('longitude' in sample) ? 'longitude' : 'lng';
            const stationNameKey = ('stationName' in sample) ? 'stationName' : (('station_name' in sample) ? 'station_name' : 'stationAlias');

            stations.forEach(station => { 
                const lat = parseFloat(station[latKey]);
                const lng = parseFloat(station[lngKey]);

                if (!isNaN(lat) && !isNaN(lng)) { 
                    const marker = L.circleMarker([lat, lng], {
                        radius: 1, fillColor: "#ffff80", color: "#000000", weight: 20, opacity: 0.0, fillOpacity: 1.0 
                    });

                    marker.bindPopup(`<b>Чиглэл:</b> ${station[nameKey]}<br><b>Зогсоол:</b> ${station[stationNameKey] || 'Нэргүй зогсоол'}`);
                    marker.addTo(map); 
                    activeMarkers[routeAlias].push(marker); 
                }
            });
        }

        // 5. Зогсоолуудыг устгах функц
        function removeRouteStations(routeAlias) { 
            if (activeMarkers[routeAlias]) { 
                activeMarkers[routeAlias].forEach(marker => { 
                    map.removeLayer(marker); 
                });
                delete activeMarkers[routeAlias]; 
            }
        }
    </script>
</body>
</html>
