<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УБ Автобусны Чиглэл</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: Arial, sans-serif; overflow: hidden;
        }

        #map { width: 100%; height: 100%; z-index: 1; }

        .sidebar { 
            position: absolute; top: 0; left: -420px; width: 400px; height: 100%; 
            background-color: #1a1a1a; color: #ffffff; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); 
            transition: left 0.3s ease; z-index: 1000; 
            display: flex; flex-direction: column; 
        }

        .sidebar.active { left: 0; }

        .sidebar-header { 
            padding: 8px; background-color: #262626; 
            border-bottom: 1px solid #333; font-size: 0.9rem; font-weight: regular; 
        }

        .route-list { padding: 15px; overflow-y: auto; flex-grow: 1; }

        .route-item { 
            display: flex; align-items: center; margin-bottom: 6px; 
            cursor: pointer; font-size: 0.80rem; 
        }

        .route-item input { margin-right: 12px; transform: scale(1.2); cursor: pointer; }

        .toggle-btn { 
            position: absolute; top: 4px; left: 15px; z-index: 1010; 
            background-color: #1a1a1a; color: white; border: 1px solid #333; 
            padding: 6px 8px; border-radius: 4px; cursor: pointer; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .toggle-btn:hover { background-color: #333333; }

        .sidebar.active + .toggle-btn { left: 315px; transition: left 0.3s ease; }

        .error-msg { color: #ff4d4d; padding: 10px; font-size: 0.9rem; }

        @media (max-width: 480px) { 
            .sidebar { width: 85%; left: -90%; }
            .sidebar.active + .toggle-btn { left: calc(85% + 15px); }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">АВТОБУСНЫ ЧИГЛЭЛҮҮД</div>
        <div class="route-list" id="route-list">Дата уншиж байна...</div>
    </div>

    <button class="toggle-btn" id="toggle-btn"> цэс </button>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Газрын зургийг Улаанбаатар хотын төв дээр анхлан нээнэ (Координат, Масштаб=13)
    const map = L.map('map').setView([47.9188, 106.9176], 13); 

    // 2. Хар Бараан (Dark Mode) загвар оруулах (CartoDB)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 20,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
    }).addTo(map); 

    // Идэвхтэй байгаа автобусны зогсоолуудын цэгийг хадгалах объект
    const activeMarkers = {}; 
    let globalData = []; // Сонгосон үед шүүлт хийх зориулалттай глобал дата

    // Хажуугийн цэс болон хайлтын талбарын элементүүдийг барьж авах
    const sidebar = document.getElementById('sidebar'); 
    const toggleBtn = document.getElementById('toggle-btn'); 
    const routeListContainer = document.getElementById('route-list'); 

    // Цэсийг нээж хаах товчлуурын логик
    toggleBtn.addEventListener('click', () => { 
        sidebar.classList.toggle('active'); 
    });

    // 3. JSON файлыг шууд нэрээр нь дуудаж унших
    fetch('UB_route_stations.json') 
        .then(response => {
            if (!response.ok) {
                throw new Error('Файлыг олсонгүй (Статус: ' + response.status + ')');
            }
            return response.json(); 
        })
        .then(data => { 
            globalData = data; 
            
            if (!Array.isArray(data) || data.length === 0) {
                routeListContainer.innerHTML = '<div class="error-msg">Файл дотор дата алга байна.</div>';
                return;
            }

            // Давтагдаагүй бүх чиглэлүүдийн датаг (код болон бүтэн нэртэй нь) бэлдэж авах
            const uniqueRoutes = [];
            const distinctAliases = [...new Set(data.map(item => item.routeAlias).filter(Boolean))];
            
            // Чиглэлүүдийг цагаан толгойн болон тооны дарааллаар эрэмбэлэх
            distinctAliases.sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
            
            distinctAliases.forEach(alias => {
                const routeInfo = data.find(item => item.routeAlias === alias);
                uniqueRoutes.push({
                    alias: alias,
                    fullName: routeInfo && routeInfo.routeName ? routeInfo.routeName : alias
                });
            });

            // 4. Жагсаалтыг дэлгэцэнд зурдаг үндсэн функц
            function renderRouteList(filteredRoutes) {
                routeListContainer.innerHTML = ''; // Хуучин жагсаалтыг цэвэрлэнэ
                
                if (filteredRoutes.length === 0) {
                    routeListContainer.innerHTML = '<div style="color: #888; padding: 10px; font-size: 0.9rem;">Илэрц олдсонгүй...</div>';
                    return;
                }

                filteredRoutes.forEach(route => { 
                    const label = document.createElement('label'); 
                    label.className = 'route-item'; 
                    
                    const checkbox = document.createElement('input'); 
                    checkbox.type = 'checkbox'; 
                    checkbox.value = route.alias;
                    
                    // Хэрэв энэ чиглэл урьд нь сонгогдсон байсан бол чекбоксыг нь асаалттай үлдээнэ
                    if (activeMarkers[route.alias]) {
                        checkbox.checked = true;
                    }
                    
                    const text = document.createTextNode(route.fullName); 
                    
                    label.appendChild(checkbox); 
                    label.appendChild(text); 
                    routeListContainer.appendChild(label); 

                    // Чекбокс дарах үеийн үйлдэл
                    checkbox.addEventListener('change', (e) => { 
                        if (e.target.checked) { 
                            showRouteStations(e.target.value); 
                        } else { 
                            removeRouteStations(e.target.value); 
                        }
                    });
                });
            }

            // Анх хуудас ачаалагдахад бүх жагсаалтыг харуулна
            renderRouteList(uniqueRoutes);

// 5. Хайлтын цонхонд суурилагдсан шүүлтүүрийн логик
            const searchInput = document.getElementById('route-search');
            
            // Хуудас ачаалагдахад хайлтын цонхыг таг хоосон болгож цэвэрлэх (Хамгаалалт)
            searchInput.value = ''; 

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                
                // Хэрэв хайлтын цонхонд юу ч бичээгүй (хоосон) байвал бүх датаг шууд харуулна
                if (query === '') {
                    renderRouteList(uniqueRoutes);
                    return;
                }
                
                // Хэрэглэгчийн бичсэн үгээр код (Ч:46), тоо (46), эсвэл бүтэн нэрнээс хайлт хийнэ
                const filtered = uniqueRoutes.filter(route => {
                    const aliasMatch = route.alias && route.alias.toLowerCase().includes(query);
                    const nameMatch = route.fullName && route.fullName.toLowerCase().includes(query);
                    return aliasMatch || nameMatch;
                });
                
                // Шүүгдсэн шинэ жагсаалтыг дэлгэцэнд зурах
                renderRouteList(filtered);
            });

    // 6. Сонгогдсон чиглэлийн автобусны зогсоолуудыг газрын зураг дээр цэгээр харуулах функц
    function showRouteStations(routeAlias) { 
        const stations = globalData.filter(item => item.routeAlias === routeAlias); 
        activeMarkers[routeAlias] = []; 

        stations.forEach(station => { 
            const lat = parseFloat(station.latitude);
            const lng = parseFloat(station.longitude);

            if (!isNaN(lat) && !isNaN(lng)) { 
                // Зогсоолуудыг жижиг дугуй цэгээр дүрсэлнэ
                const marker = L.circleMarker([lat, lng], {
                    radius: 6,
                    fillColor: "#ff7800",
                    color: "#000",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.8 
                });

                // Цэг дээр дарахад гарах мэдээлэл (Чиглэл болон Зогсоолын нэр)
                marker.bindPopup(`<b>Чиглэл:</b> ${station.routeName || routeAlias}<br><b>Зогсоол:</b> ${station.stationName || station.stationAlias || 'Нэргүй зогсоол'}`);
                marker.addTo(map); 
                activeMarkers[routeAlias].push(marker); 
            }
        });
    }

    // 7. Чекбокс идэвхгүй болох үед зогсоолын цэгүүдийг газрын зургаас устгах функц
    function removeRouteStations(routeAlias) { 
        if (activeMarkers[routeAlias]) { 
            activeMarkers[routeAlias].forEach(marker => { 
                map.removeLayer(marker); 
            });
            delete activeMarkers[routeAlias]; 
        }
    }
</script>
</body>
</html>
