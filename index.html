<!DOCTYPE html> <html lang="mn"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" /> <title>Responsive Dark Map with Excel GPS Points</title> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
<style>
    html, body { height: 100%; margin: 0; padding: 0; background-color: #111; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    #map { width: 100%; height: 100%; position: absolute; top:0; bottom:0; left:0; right:0; z-index: 1; }

    /* ЗҮҮН ирмэгт байрлах цэнхэр жижиг хавчуурга (Tab) */
    .sidebar-tab {
        position: absolute;
        top: 50%;
        left: 0;
        transform: translateY(-50%);
        z-index: 1000;
        background: #007bff; /* Цэнхэр өнгө */
        color: #fff;
        padding: 12px 3px;
        font-size: 14px;
        cursor: pointer;
        border-radius: 0 4px 4px 0; /* Зүүн талдаа наалдаж, баруун тийш дугуйрах */
        box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        text-orientation: mixed;
        letter-spacing: 1px;
        user-select: none;
        transition: background 0.2s, left 0.3s ease;
    }
    .sidebar-tab:hover { background: #0056b3; }
    .sidebar-tab.hidden { left: -40px; } /* Цонх нээгдэхэд нуугдана */

    /* ЗҮҮН талаас нээгддэг хагас тунгалаг цонх */
    .sidebar {
        position: absolute;
        top: 0;
        left: -450px; /* Зүүн талд нуугдмал */
        width: 420px;
        height: 100%;
        background: rgba(20, 20, 20, 0.1); /* Хагас тунгалаг хар */
        backdrop-filter: blur(3px); /* Арын газрын зургийг бүрсийлгэх */
        -webkit-backdrop-filter: blur(3px);
        z-index: 1001;
        box-shadow: 5px 0 25px rgba(0,0,0,0.5);
        transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        color: #fff;
        border-right: 1px solid rgba(255, 255, 255, 0.07);
    }
    .sidebar.open { left: 0; }

    /* Цонхны толгой */
    .sidebar-header {
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-header h3 { margin: 0; font-size: 13px; font-weight: 500; color: #ffff80; }
    .close-btn {
        background: none;
        border: none;
        color: #aaa;
        font-size: 24px;
        cursor: pointer;
        padding: 0;
        line-height: 1;
    }
    .close-btn:hover { color: #fff; }

    /* Хайлтын хэсэг */
    .search-box { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .search-box input {
        width: 100%;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        color: #fff;
        font-size: 13px;
        box-sizing: border-box;
        outline: none;
    }
    .search-box input:focus { border-color: #007bff; background: rgba(255, 255, 255, 0.12); }

    /* Жагсаалт гүйх хэсэг */
    .route-list { overflow-y: auto; flex: 1; padding: 5px 10px; }
    .route-item {
        display: flex;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .route-item:hover { color: #ffff80; }
    .route-item input[type="checkbox"] {
        margin-right: 10px;
        width: 15px;
        height: 15px;
        accent-color: #007bff;
        cursor: pointer;
    }
    .route-text { font-size: 13px; line-height: 1.0; word-break: break-word; cursor: pointer; display: flex; align-items: center; width: 100%; }
    .route-code { font-weight: 500; color: #ffff80; margin-right: 6px; white-space: nowrap; }

    .route-list::-webkit-scrollbar { width: 4px; }
    .route-list::-webkit-scrollbar-track { background: transparent; }
    .route-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">Автобусны чиглэлүүд</div>
        
        <div class="search-container">
            <input type="text" id="route-search" placeholder="Чиглэл, дугаар, нэрээр хайх...">
        </div>

        <div class="route-list" id="route-list">Дата уншиж байна...</div>
    </div>

    <button class="toggle-btn" id="toggle-btn">☰ Цэс</button>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Газрын зургийг Улаанбаатар хотын төв дээр нээнэ
        const map = L.map('map').setView([47.9188, 106.9176], 13); 

        // 2. Dark Mode загвар оруулах
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map); 

        const activeMarkers = {}; 
        let globalData = []; 

        const sidebar = document.getElementById('sidebar'); 
        const toggleBtn = document.getElementById('toggle-btn'); 
        const routeListContainer = document.getElementById('route-list'); 
        const searchInput = document.getElementById('route-search');

        toggleBtn.addEventListener('click', () => { 
            sidebar.classList.toggle('active'); 
        });

        // Хайлтын талбарыг анхлан цэвэрлэх
        if (searchInput) searchInput.value = '';

        // 3. JSON файлыг унших
        fetch('UB_route_stations.json') 
            .then(response => {
                if (!response.ok) {
                    throw new Error('Файлыг олсонгүй (Статус: ' + response.status + ')');
                }
                return response.json(); 
            })
            .then(data => { 
                globalData = data; 
                
                if (!Array.isArray(data) || data.length === 0) {
                    routeListContainer.innerHTML = '<div class="error-msg">Файл дотор дата алга байна.</div>';
                    return;
                }

                // Давтагдаагүй чиглэлүүдийн датаг бэлдэж авах
                const uniqueRoutes = [];
                const distinctAliases = [...new Set(data.map(item => item.routeAlias).filter(Boolean))];
                
                distinctAliases.sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
                
                distinctAliases.forEach(alias => {
                    const routeInfo = data.find(item => item.routeAlias === alias);
                    uniqueRoutes.push({
                        alias: alias,
                        fullName: routeInfo && routeInfo.routeName ? routeInfo.routeName : alias
                    });
                });

                // 4. Жагсаалтыг зурах функц
                function renderRouteList(filteredRoutes) {
                    routeListContainer.innerHTML = ''; 
                    
                    if (filteredRoutes.length === 0) {
                        routeListContainer.innerHTML = '<div style="color: #888; padding: 10px; font-size: 0.9rem;">Илэрц олдсонгүй...</div>';
                        return;
                    }

                    filteredRoutes.forEach(route => { 
                        const label = document.createElement('label'); 
                        label.className = 'route-item'; 
                        
                        const checkbox = document.createElement('input'); 
                        checkbox.type = 'checkbox'; 
                        checkbox.value = route.alias;
                        
                        if (activeMarkers[route.alias]) {
                            checkbox.checked = true;
                        }
                        
                        const text = document.createTextNode(route.fullName); 
                        
                        label.appendChild(checkbox); 
                        label.appendChild(text); 
                        routeListContainer.appendChild(label); 

                        checkbox.addEventListener('change', (e) => { 
                            if (e.target.checked) { 
                                showRouteStations(e.target.value); 
                            } else { 
                                removeRouteStations(e.target.value); 
                            }
                        });
                    });
                }

                // Анхны жагсаалтыг гаргах
                renderRouteList(uniqueRoutes);

                // 5. Хайлтын логик
                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        const query = e.target.value.toLowerCase().trim();
                        
                        if (query === '') {
                            renderRouteList(uniqueRoutes);
                            return;
                        }
                        
                        const filtered = uniqueRoutes.filter(route => {
                            const aliasMatch = route.alias && route.alias.toLowerCase().includes(query);
                            const nameMatch = route.fullName && route.fullName.toLowerCase().includes(query);
                            return aliasMatch || nameMatch;
                        });
                        
                        renderRouteList(filtered);
                    });
                }
            })
            .catch(error => { 
                console.error(error);
                routeListContainer.innerHTML = `<div class="error-msg">Алдаа: Датаг уншиж чадсангүй.<br>${error.message}</div>`;
            });

        // 6. Автобусны зогсоолуудыг цэгээр харуулах функц
        function showRouteStations(routeAlias) { 
            const stations = globalData.filter(item => item.routeAlias === routeAlias); 
            activeMarkers[routeAlias] = []; 

            stations.forEach(station => { 
                const lat = parseFloat(station.latitude);
                const lng = parseFloat(station.longitude);

                if (!isNaN(lat) && !isNaN(lng)) { 
                    const marker = L.circleMarker([lat, lng], {
                        radius: 6, fillColor: "#ff7800", color: "#000", weight: 1, opacity: 1, fillOpacity: 0.8 
                    });

                    marker.bindPopup(`<b>Чиглэл:</b> ${station.routeName || routeAlias}<br><b>Зогсоол:</b> ${station.stationName || station.stationAlias || 'Нэргүй зогсоол'}`);
                    marker.addTo(map); 
                    activeMarkers[routeAlias].push(marker); 
                }
            });
        }

        // 7. Зогсоолын цэгүүдийг устгах функц
        function removeRouteStations(routeAlias) { 
            if (activeMarkers[routeAlias]) { 
                activeMarkers[routeAlias].forEach(marker => { 
                    map.removeLayer(marker); 
                });
                delete activeMarkers[routeAlias]; 
            }
        }
    </script>
</body>
</html>
