<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UB Bus Routes</title>
    <link rel="icon" type="image/png" sizes="32x32" href="bus.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; overflow: hidden;
        }

        #map { width: 100%; height: 100%; z-index: 1; }

        .sidebar { 
            position: absolute; top: 0; left: -420px; width: 400px; height: 100%; 
            background-color: #1a1a1a; color: #ffffff; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); 
            transition: left 0.3s ease; z-index: 1000; 
            display: flex; flex-direction: column; 
        }

        .sidebar.active { left: 0; }

        .sidebar-header { 
            padding: 16px 40px 16px 20px; 
            background-color: #262626; 
            font-size: 0.8rem; font-weight: 300; 
            position: relative; 
        }

        .close-btn {
            position: absolute; top: 18px; right: 15px;
            background: none; border: none; color: #888;
            font-size: 1.4rem; cursor: pointer; font-weight: regular;
            padding: 0; line-height: 1; transition: color 0.2s ease;
        }
        .close-btn:hover { color: #ff4d4d; }

        .search-container {
            padding: 0 15px 10px 15px;
            background-color: #262626;
        }

        #route-search {
            width: 100%; padding: 8px; border-radius: 4px; 
            border: 1px solid #444; background-color: #1a1a1a; 
            color: #fff; box-sizing: border-box; font-size: 0.8rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        #route-search:focus {
            border-color: #0099ff;
        }

        .select-all-container {
            padding: 10px 15px;
            background-color: #202020;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
        }
        .select-all-container input {
            margin-right: 12px;
            transform: scale(1.2);
            cursor: pointer;
        }

        .route-list { 
    padding: 15px; 
    overflow-y: auto; 
    flex-grow: 1; 
    
/* Firefox хөтөчид зориулсан нарийхан скролл */
    scrollbar-width: thin;
    scrollbar-color: #444444 transparent;
}

/* Chrome, Safari, Edge хөтөч болон гар утсанд зориулсан скролл зураасны загвар */
.route-list::-webkit-scrollbar {
    width: 4px; /* Скроллыг 4px болгох */
}

/* Скролл гүйгч гүдгэр хэсгийн загвар */
.route-list::-webkit-scrollbar-thumb {
    background-color: #444444;
    border-radius: 10px;
}

/* Хулганаа дээр нь аваачих үед үл ялиг тодрох */
.route-list::-webkit-scrollbar-thumb:hover {
    background-color: #0099ff;
}

/* Скроллын арын суурь */
.route-list::-webkit-scrollbar-track {
    background: transparent;
}

.route-item { 
            display: flex; align-items: center; margin-bottom: 10px; 
            cursor: pointer; font-size: 0.8rem; 
            line-height: 1.0;
}
.route-item input { margin-right: 12px; transform: scale(1.2); cursor: pointer; }

.toggle-btn { 
            position: absolute; top: 50%; left: 0; 
            transform: translateY(-50%); 
            width: 25px;
            height: 60px;
            background: #0099ff;
            border: none;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            z-index: 1200;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 0 6px rgba(0,0,0,0.3);
            transition: left 0.25s ease;
}
.toggle-btn svg {
            width: 18px;
            height: 18px;
            fill: #ffffff;
            transition: transform 0.25s ease;
}
.sidebar.active ~ .toggle-btn svg {
            transform: rotate(180deg);
}

.sidebar.active + .toggle-btn { left: 400px; }

.error-msg { color: #ff4d4d; padding: 10px; font-size: 0.9rem; }

@media (max-width: 480px) { 
            .sidebar { width: 85%; left: -85%; }
            .sidebar.active + .toggle-btn { left: 85vw; }
}

.locate-btn {
    position: absolute;
    bottom: 24px;
    right: 24px;
    width: 44px;
    height: 44px;
    background: #ffffff;
    border: none;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 1000;
    transition: right 0.25s ease, background 0.15s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
}

.locate-btn:focus {
    outline: none;
}

.locate-btn:hover {
    background: #f1f1f1;
}

.locate-icon {
    width: 22px;
    height: 22px;
    fill: #4285F4;
    transition: fill 0.2s ease;
}

.locate-btn.loading .locate-icon,
.locate-btn.active .locate-icon {
    fill: #0099ff;
}

.pulse-marker-wrapper {
    background: transparent !important;
    border: none !important;
}
.pulse-marker {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #4285F4;
    border: 3px solid #ffffff;
    box-shadow: 0 0 0 rgba(66,133,244,0.5);
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(66,133,244,0.5); }
    70% { box-shadow: 0 0 0 12px rgba(66,133,244,0); }
    100% { box-shadow: 0 0 0 0 rgba(66,133,244,0); }
}


.leaflet-popup-content-wrapper {
    background-color: #262626 !important;
    color: #ffffff !important;
    border-radius: 6px !important;
    box-shadow: 0 3px 14px rgba(0,0,0,0.5) !important;
}

.leaflet-popup-tip {
    background-color: #262626 !important;
}

.leaflet-popup-content {
    color: #808080 !important;
    font-family: Arial, sans-serif;
    margin: 12px 15px !important;
}

.leaflet-popup-close-button {
    color: #888888 !important;
}
.leaflet-popup-close-button:hover {
    color: #ff4d4d !important;
}

.theme-btn {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 25px;
    height: 25px;
    background: none;
    border: none;
    border-radius: 50%;
    padding: 0;
    cursor: pointer;
    z-index: 1000;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

.theme-btn:focus {
    outline: none;
}

.theme-btn img {
    width: 25px;
    height: 25px;
    border-radius: 50%;
    display: block;
}

.map-copyright {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    
    font-family: Arial, sans-serif;
    font-size: 0.7rem;
    color: #999999;
    background-color: rgba(26, 26, 26, 0.0);
    padding: 3px 8px;
    border-radius: 3px;
    pointer-events: none;
    white-space: nowrap;
}
        
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            АВТОБУСНЫ ЧИГЛЭЛҮҮД
            <button class="close-btn" id="close-btn">×</button>
        </div>
        
        <div class="search-container">
            <input type="text" id="route-search" placeholder="Чиглэл, дугаар, нэрээр хайх...">
        </div>

        <label class="select-all-container" id="select-all-label" style="display: none;">
            <input type="checkbox" id="select-all-checkbox">
            <span>Бүгдийг сонгох</span>
        </label>

        <div class="route-list" id="route-list">Дата уншиж байна...</div>
    </div>

    <button class="toggle-btn" id="toggle-btn" title="Менюг нээх/хаах">
        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
    </button>
    <div id="map"></div>

    <button class="locate-btn" id="locate-btn" title="Миний байршил">
    <svg class="locate-icon" viewBox="0 0 24 24">
        <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
    </svg> </button>

    <button class="theme-btn" id="theme-btn" title="Өдөр/Шөнийн горим">
        <img src="daynight2.png" id="theme-icon" alt="theme toggle">
    </button>

    <div class="map-copyright">UB Bus Routes &copy; 2026 The2m16</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([47.9188, 106.9176], 13);

        const darkTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
        });

        const lightTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 20,
        });

        darkTile.addTo(map);
        let isDark = true;

        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = document.getElementById('theme-icon');

        themeBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            if (isDark) {
                map.removeLayer(darkTile);
                lightTile.addTo(map);
                themeIcon.src = 'daynight1.png';
                isDark = false;
            } else {
                map.removeLayer(lightTile);
                darkTile.addTo(map);
                themeIcon.src = 'daynight2.png';
                isDark = true;
            }
        });

        const activeMarkers = {};

// байршил тогтоох логик
const locateBtn = document.getElementById('locate-btn');
let userLocationMarker = null;

locateBtn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();

    if (!navigator.geolocation) {
        alert('Энэ хөтөч байршил тогтоохыг дэмжихгүй байна.');
        return;
    }

    locateBtn.classList.add('active');

    navigator.geolocation.getCurrentPosition(function(pos) {
        const latlng = [pos.coords.latitude, pos.coords.longitude];

        if (userLocationMarker) {
            map.removeLayer(userLocationMarker);
        }

        const icon = L.divIcon({
            className: 'pulse-marker-wrapper',
            html: '<div class="pulse-marker"></div>',
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        userLocationMarker = L.marker(latlng, { icon: icon }).addTo(map);

        map.setView(latlng, 17);
    }, function(err) {
        alert('Байршил тогтоох амжилтгүй боллоо: ' + err.message);
    }, {
        enableHighAccuracy: true,
        timeout: 10000
    });

    setTimeout(() => locateBtn.classList.remove('active'), 1000);
});
        
        let globalData = []; 

        const sidebar = document.getElementById('sidebar'); 
        const toggleBtn = document.getElementById('toggle-btn'); 
        const closeBtn = document.getElementById('close-btn'); 
        const routeListContainer = document.getElementById('route-list'); 
        const searchInput = document.getElementById('route-search');
        
        // 🌟 ШИНЭ: Бүгдийг чеклэх элементийг барьж авах
        const selectAllLabel = document.getElementById('select-all-label');
        const selectAllCheckbox = document.getElementById('select-all-checkbox');

        toggleBtn.addEventListener('click', () => { sidebar.classList.toggle('active'); });
        closeBtn.addEventListener('click', () => { sidebar.classList.remove('active'); });

        document.addEventListener('click', (e) => {

    if (sidebar.classList.contains('active') && 
        !sidebar.contains(e.target) && 
        !toggleBtn.contains(e.target)) {
        sidebar.classList.remove('active');
    }
});

        if (searchInput) searchInput.value = '';

        // JSON файлыг унших
        fetch('UB_route_stations.json') 
            .then(response => {
                if (!response.ok) { throw new Error('Файлыг олсонгүй (Статус: ' + response.status + ')'); }
                return response.json(); 
            })
            .then(data => { 
                globalData = data; 
                
                if (!Array.isArray(data) || data.length === 0) {
                    routeListContainer.innerHTML = '<div class="error-msg">Файл дотор дата алга байна.</div>';
                    return;
                }

                const uniqueRoutes = [];
                const distinctAliases = [...new Set(data.map(item => item.routeAlias).filter(Boolean))];
                
                distinctAliases.sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
                
                distinctAliases.forEach(alias => {
                    const routeInfo = data.find(item => item.routeAlias === alias);
                    uniqueRoutes.push({
                        alias: alias,
                        fullName: routeInfo && routeInfo.routeName ? routeInfo.routeName : alias
                    });
                });

                let currentVisibleRoutes = [];

                function renderRouteList(filteredRoutes) {
                    routeListContainer.innerHTML = ''; 
                    currentVisibleRoutes = filteredRoutes;
                    
                    if (filteredRoutes.length === 0) {
                        routeListContainer.innerHTML = '<div style="color: #888; padding: 10px; font-size: 0.9rem;">Илэрц олдсонгүй...</div>';
                        selectAllLabel.style.display = 'none';
                        return;
                    }

                    selectAllLabel.style.display = 'flex';

                    const allChecked = filteredRoutes.every(route => activeMarkers[route.alias]);
                    selectAllCheckbox.checked = allChecked;

                    filteredRoutes.forEach(route => { 
                        const label = document.createElement('label'); 
                        label.className = 'route-item'; 
                        
                        const checkbox = document.createElement('input'); 
                        checkbox.type = 'checkbox'; 
                        checkbox.className = 'route-checkbox';
                        checkbox.value = route.alias;
                        
                        if (activeMarkers[route.alias]) {
                            checkbox.checked = true;
                        }
                        
                        const text = document.createTextNode(route.fullName); 
                        
                        label.appendChild(checkbox); 
                        label.appendChild(text); 
                        routeListContainer.appendChild(label); 

                        checkbox.addEventListener('change', (e) => { 
                            if (e.target.checked) { 
                                showRouteStations(e.target.value); 
                            } else { 
                                removeRouteStations(e.target.value); 
                            }

                            const currentAllChecked = currentVisibleRoutes.every(r => activeMarkers[r.alias]);
                            selectAllCheckbox.checked = currentAllChecked;
                        });
                    });
                }

                renderRouteList(uniqueRoutes);

                selectAllCheckbox.addEventListener('change', (e) => {
                    const isChecked = e.target.checked;
                    

                    currentVisibleRoutes.forEach(route => {
                        if (isChecked) {

                            if (!activeMarkers[route.alias]) {
                                showRouteStations(route.alias);
                            }
                        } else {

                            if (activeMarkers[route.alias]) {
                                removeRouteStations(route.alias);
                            }
                        }
                    });

                    const checkboxes = routeListContainer.querySelectorAll('.route-checkbox');
                    checkboxes.forEach(cb => {
                        cb.checked = isChecked;
                    });
                });

                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        const query = e.target.value.toLowerCase().trim();
                        
                        if (query === '') {
                            renderRouteList(uniqueRoutes);
                            return;
                        }
                        
                        const filtered = uniqueRoutes.filter(route => {
                            const aliasMatch = route.alias && route.alias.toLowerCase().includes(query);
                            const nameMatch = route.fullName && route.fullName.toLowerCase().includes(query);
                            return aliasMatch || nameMatch;
                        });
                        
                        renderRouteList(filtered);
                    });
                }
            })
            .catch(error => { 
                console.error(error);
                routeListContainer.innerHTML = `<div class="error-msg">Алдаа: Датаг уншиж чадсангүй.<br>${error.message}</div>`;
            });
        
function showRouteStations(routeAlias) { 
    // Хуучин массив бүтцээс тухайн чиглэлд хамаарах зогсоолуудыг шүүх
    const stations = globalData.filter(item => item.routeAlias === routeAlias); 
    activeMarkers[routeAlias] = []; 

    stations.forEach(station => { 
        const lat = parseFloat(station.latitude);
        const lng = parseFloat(station.longitude);

        if (!isNaN(lat) && !isNaN(lng)) { 
            
            // зогсоол дээр давхцаж буй бүх чиглэлүүдийг JSON-оос шүүж олох
            const passingRoutesRaw = globalData
                .filter(item => item.stationName === station.stationName)
                .map(item => item.routeAlias);
            
            // Давхардлыг арилгах (жишээ нь: Ч:1, Ч:46, Ү:12)
            const passingRoutes = [...new Set(passingRoutesRaw)];

            // Чиглэлүүдийг таслалаар тусгаарлаж, нэг мөр текст болгох
            const routesText = passingRoutes.join(', ');

            // Дугуй маркер үүсгэх тохиргоо (Цагаан хүрээтэй)
            const marker = L.circleMarker([lat, lng], {
                radius: 2,
                fillColor: "#38bdf8",
                color: "#000000", 
                weight: 20,
                opacity: 0.0,
                fillOpacity: 1.0,
                className: 'custom-bus-marker'
            });

            marker.bindPopup(`
                <div style="font-family: Arial, sans-serif; line-height: 1.3; font-size: 0.95rem;">
                    Зогсоол: <span style="color: #ffffff; font-size: 0.95rem;">${station.stationName || 'Нэргүй зогсоол'}</span><br>
                    <span style="color: #ffffff; font-size: 0.95rem;">${station.routeName || routeAlias}</span>
                    <div style="margin-top: 4px; padding-top: 4px; border-top: 1px solid #ccc; font-size: 0.85rem;">
                    Дамжин суух бусад чиглэл: <span style="color: #ffffff; font-weight: bold;">${routesText}</span>
                    </div>
                </div>
            `);

            marker.addTo(map); 
            activeMarkers[routeAlias].push(marker); 
        }
    });
}
        
        function removeRouteStations(routeAlias) { 
            if (activeMarkers[routeAlias]) { 
                activeMarkers[routeAlias].forEach(marker => { 
                    map.removeLayer(marker); 
                });
                delete activeMarkers[routeAlias]; 
            }
        }
    </script>
</body>
</html>
