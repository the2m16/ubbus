<!DOCTYPE html> <html lang="mn"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>УБ Автобусны Чиглэл</title> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style> /* Хуудасны үзэмж, дизайныг тодорхойлох CSS хэсэг */
        html, body { /* Үндсэн хуудасны өндөр, өргөнийг тохируулна */
            margin: 0; /* Гадуурх зайг 0 болгоно */
            padding: 0; /* Доторх зайг 0 болгоно */
            width: 100%; /* Өргөнийг дэлгэц дүүрэн болгоно */
            height: 100%; /* Өндрийг дэлгэц дүүрэн болгоно */
            font-family: Arial, sans-serif; /* Үсгийн фонтыг Arial болгож тохируулна */
            overflow: hidden; /* Хуудасны үндсэн гүйлгэх зурвасыг нууна */
        }

        #map { /* Газрын зураг байрлах талбарын загвар */
            width: 100%; /* Өргөн нь дэлгэц дүүрэн байна */
            height: 100%; /* Өндөр нь дэлгэц дүүрэн байна */
            z-index: 1; /* Газрын зургийг арын давхаргад байрлуулна */
        }

        /* Зүүн талаас нээгддэг хажуугийн цэсний загвар */
        .sidebar { 
            position: absolute; /* Газрын зураг дээр давхарлаж байрлуулна */
            top: 0; /* Дээд талаас 0 зайтай */
            left: -320px; /* Анхлан зүүн тийш далд (нуугдмал) байдалтай байна */
            width: 300px; /* Цэсний өргөнийг 300px болгоно */
            height: 100%; /* Өндөр нь дэлгэц дүүрэн байна */
            background-color: #1a1a1a; /* Хар бараан өнгийн дэвсгэр */
            color: #ffffff; /* Текстүүдийг цагаан өнгөтэй болгоно */
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); /* Баруун талдаа сүүдэр үүсгэнэ */
            transition: left 0.3s ease; /* Нээгдэж хаагдах хөдөлгөөнийг зөөлөн болгоно */
            z-index: 1000; /* Газрын зураг дээр илүү дээд давхаргад гаргана */
            display: flex; /* Доторх элементүүдийг уян хатан байрлуулна */
            flex-direction: column; /* Доторх контентыг дээрээс доош цувуулна */
        }

        /* Цэс идэвхжих (нээгдэх) үеийн класс */
        .sidebar.active { 
            left: 0; /* Зүүн байрлалыг 0 болгож дэлгэцэнд гаргана */
        }

        .sidebar-header { /* Цэсний толгой хэсэг */
            padding: 20px; /* Дотор талын зайг тохируулна */
            background-color: #262626; /* Үндсэн дэвсгэрээс арай цайвар хар өнгө */
            border-bottom: 1px solid #333; /* Доод талд нь нарийн зураас татна */
            font-size: 1.2rem; /* Үсгийн хэмжээг тохируулна */
            font-weight: bold; /* Үсгийг тод болгоно */
        }

        .route-list { /* Автобусны чиглэлүүд байрлах жагсаалтын талбар */
            padding: 15px; /* Дотор талын зайг тохируулна */
            overflow-y: auto; /* Контент ихдвэл босоо тэнхлэгт гүйлгэдэг зурвас гаргана */
            flex-grow: 1; /* Үлдсэн бүх хоосон зайг энэ хэсэг эзэлнэ */
        }

        .route-item { /* Чиглэл бүрийн мөрийн загвар */
            display: flex; /* Чекбокс болон бичвэрийг нэг мөрөнд байрлуулна */
            align-items: center; /* Босоо тэнхлэгийн дагуу голлуулна */
            margin-bottom: 12px; /* Мөр хоорондын зайг тохируулна */
            cursor: pointer; /* Хулгана очиход гар хэлбэртэй болгоно */
            font-size: 0.95rem; /* Үсгийн хэмжээ */
        }

        .route-item input { /* Чекбокс (нүд)-ны загвар */
            margin-right: 12px; /* Чекбоксны баруун талд зай авна */
            transform: scale(1.2); /* Чекбоксыг арай том хэмжээтэй болгоно */
            cursor: pointer; /* Хулгана очиход гар хэлбэртэй болгоно */
        }

        /* Цэсийг нээж хаах товчлуурын загвар */
        .toggle-btn { 
            position: absolute; /* Газрын зураг дээр байрлуулна */
            top: 15px; /* Дээд талаас 15px зайтай */
            left: 15px; /* Зүүн талаас 15px зайтай */
            z-index: 999; /* Газрын зураг дээр, гэхдээ хажуу цэснээс доор давхаргад */
            background-color: #1a1a1a; /* Хар бараан өнгийн товчлуур */
            color: white; /* Цагаан өнгийн дүрс/текст */
            border: 1px solid #333; /* Нарийн хүрээ зураас */
            padding: 10px 15px; /* Товчлуурын доторх зай */
            border-radius: 4px; /* Буланг үл ялиг дугуйлна */
            cursor: pointer; /* Хулгана очиход гар хэлбэртэй болгоно */
            font-weight: bold; /* Текстийг тод болгоно */
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); /* Товчлуурт сүүдэр оруулна */
        }

        .toggle-btn:hover { /* Товчлуур дээр хулгана очих үеийн загвар */
            background-color: #333333; /* Өнгийг үл ялиг цайруулна */
        }

        /* Хажуугийн цэс нээлттэй үед товчлуурыг баруун тийш шилжүүлэх */
        .sidebar.active + .toggle-btn { 
            left: 315px; /* Цэсний өргөнөөс цааш шилжүүлж харагдуулна */
            transition: left 0.3s ease; /* Шилжилтийг зөөлөн харуулна */
        }

        /* Responsive тохиргоо: Гар утасны жижиг дэлгэцэнд зориулсан загвар */
        @media (max-width: 480px) { 
            .sidebar { 
                width: 85%; /* Утан дээр хажуу цэс дэлгэцийн 85 хувийг эзэлнэ */
                left: -90%; /* Анхлан нуугдах зайг өргөсгөнө */
            }
            .sidebar.active + .toggle-btn { 
                left: calc(85% + 15px); /* Гар утас дээр товчлуурын шилжих зайг тааруулна */
            }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">Автобусны чиглэлүүд</div> <div class="route-list" id="route-list"></div> </div>

    <button class="toggle-btn" id="toggle-btn">☰ Цэс</button>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script> /* Програмын логик, дата унших болон зураглах JS хэсэг */
        
        // 1. Газрын зургийг Улаанбаатар хотын төв дээр анхлан нээнэ (Координат, Масштаб=13)
        const map = L.map('map').setView([47.9188, 106.9176], 13); 

// 2. Үнэгүй, шууд ажиллах Хар Бараан (Dark Mode) загвар оруулах (CartoDB)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 20,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
}).addTo(map);

        // Идэвхтэй байгаа автобусны зогсоолуудын цэгийг хадгалах объект (Устгах, нэмэхэд хэрэглэнэ)
        const activeMarkers = {}; 
        let globalData = []; // Сонгосон үед шүүлт хийх зориулалттай глобал дата хадгалах хувьсагч

        // 3. Хажуугийн цэсийг нээж, хаах товчлуурын логик
        const sidebar = document.getElementById('sidebar'); // Цэсний элементийг барьж авах
        const toggleBtn = document.getElementById('toggle-btn'); // Товчлуурын элементийг барьж авах

        toggleBtn.addEventListener('click', () => { // Товчлуур дээр дарах үед ажиллах функц
            sidebar.classList.toggle('active'); // active классыг нэмэх эсвэл хасах
        });

        // 4. JSON файлаас автобусны зогсоол, чиглэлийн датаг унших функц
        fetch('UB_route_stations.json') // Ижил хавтас дахь JSON файлыг дуудах
            .then(response => response.json()) // Ирсэн хариуг JSON хэлбэрт хөрвүүлэх
            .then(data => { // Дата амжилттай уншигдсаны дараа ажиллах хэсэг
                globalData = data; // Уншсан датагаа глобал хувьсагчид хадгалах
                
                // Дата дотроос давтагдаагүй цор ганц автобусны чиглэлүүдийг (routeAlias) ялган авах
                const routes = [...new Set(data.map(item => item.routeAlias))]; 
                
                // Ялгаж авсан чиглэлүүдийг цагаан толгойн дарааллаар эрэмбэлэх
                routes.sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));

                const routeListContainer = document.getElementById('route-list'); // Жагсаалт орох талбар
                
                // Чиглэл бүрт зориулж Чекбокс бүхий мөрүүдийг HTML дээр үүсгэх
                routes.forEach(route => { 
                    const label = document.createElement('label'); // Шинэ label элемент үүсгэх
                    label.className = 'route-item'; // Класс нэр өгөх
                    
                    const checkbox = document.createElement('input'); // Шинэ input элемент үүсгэх
                    checkbox.type = 'checkbox'; // Төрлийг нь чекбокс болгох
                    checkbox.value = route; // Чекбоксны утгад чиглэлийг оноох (ж.нь: Ч:46)
                    
                    const text = document.createTextNode(route); // Чиглэлийн нэрийг бичвэр болгож үүсгэх
                    
                    label.appendChild(checkbox); // Чекбоксыг label дотор хийх
                    label.appendChild(text); // Бичвэрийг label дотор хийх
                    routeListContainer.appendChild(label); // Бэлэн болсон мөрийг жагсаалтын талбарт нэмэх

                    // Чекбокс дээр дарах (унтрааж, асаах) үеийн үйлдэл
                    checkbox.addEventListener('change', (e) => { 
                        if (e.target.checked) { // Хэрэв чекбокс идэвхжсэн бол
                            showRouteStations(e.target.value); // Тухайн чиглэлийн зогсоолуудыг зурах функцийг дуудна
                        } else { // Хэрэв чекбокс идэвхгүй болсон бол
                            removeRouteStations(e.target.value); // Тухайн чиглэлийн зогсоолуудыг газрын зургаас устгана
                        }
                    });
                });
            })
            .catch(error => console.error('Дата уншихад алдаа гарлаа:', error)); // Алдаа гарвал консол дээр хэвлэнэ

        // 5. Сонгогдсон чиглэлийн автобусны зогсоолуудыг газрын зураг дээр цэгээр харуулах функц
        function showRouteStations(routeAlias) { 
            // Глобал датагаас зөвхөн сонгогдсон чиглэлд (routeAlias) хамаарах зогсоолуудыг шүүж авах
            const stations = globalData.filter(item => item.routeAlias === routeAlias); 
            
            activeMarkers[routeAlias] = []; // Тухайн чиглэлийн цэгүүдийг хадгалах хоосон массив үүсгэх

            stations.forEach(station => { // Шүүж авсан зогсоол бүрээр давталт хийх
                // Уртраг, өргөрөг зөв өгөгдсөн эсэхийг шалгах
                if (station.latitude && station.longitude) { 
                    
                    // Хялбар, цэвэрхэн харагдуулах үүднээс жижиг дугуй цэгэн (CircleMarker) хэлбэрээр зурна
                    const marker = L.circleMarker([station.latitude, station.longitude], {
                        radius: 6, // Цэгийн хэмжээ/радиус
                        fillColor: "#ff7800", // Цэгийн доторх өнгө (Улбар шар)
                        color: "#000", // Хүрээний өнгө (Хар)
                        weight: 1, // Хүрээний зузаан
                        opacity: 1, // Хүрээний тунгалаг байдал
                        fillOpacity: 0.8 // Доторх өнгөний тунгалаг байдал
                    });

                    // Цэг дээр дарах үед автобусны чиглэл болон зогсоолын нэрийг харуулах Pop-up бэлдэх
                    marker.bindPopup(`<b>Чиглэл:</b> ${station.routeName}<br><b>Зогсоол:</b> ${station.stationName}`);
                    
                    marker.addTo(map); // Бэлэн болсон цэгийг газрын зураг дээр нэмэх
                    activeMarkers[routeAlias].push(marker); // Дараа нь устгах зорилгоор массивт хадгалах
                }
            });
        }

        // 6. Чекбокс идэвхгүй болох үед зогсоолын цэгүүдийг газрын зургаас устгах функц
        function removeRouteStations(routeAlias) { 
            if (activeMarkers[routeAlias]) { // Хэрэв тухайн чиглэлийн цэгүүд газрын зураг дээр байгаа бол
                activeMarkers[routeAlias].forEach(marker => { // Бүх цэгүүдээр давталт хийж
                    map.removeLayer(marker); // Газрын зургаас хасаж устгана
                });
                delete activeMarkers[routeAlias]; // Багц хувьсагчаас тухайн чиглэлийн индексийг устгана
            }
        }
    </script>
</body>
</html>
