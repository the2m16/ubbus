<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автобусны Чиглэл</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: Arial, sans-serif; overflow: hidden;
        }

        #map { width: 100%; height: 100%; z-index: 1; }

        /* Зүүн хажуугийн цэс */
        .sidebar { 
            position: absolute; top: 0; left: -420px; width: 400px; height: 100%; 
            background-color: #1a1a1a; color: #ffffff; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); 
            transition: left 0.3s ease; z-index: 1000; 
            display: flex; flex-direction: column; 
        }

        .sidebar.active { left: 0; }

        .sidebar-header { 
            padding: 20px 40px 15px 20px; 
            background-color: #262626; 
            font-size: 0.8rem; font-weight: regular; 
            position: relative; 
        }

        /* Цэсийг хаах X товчлуур */
        .close-btn {
            position: absolute; top: 18px; right: 15px;
            background: none; border: none; color: #888;
            font-size: 1.4rem; cursor: pointer; font-weight: regular;
            padding: 0; line-height: 1; transition: color 0.2s ease;
        }
        .close-btn:hover { color: #ff4d4d; }

        /* Хайлтын хэсэг */
        .search-container {
            padding: 0 15px 10px 15px;
            background-color: #262626;
        }

        #route-search {
            width: 100%; padding: 8px; border-radius: 4px; 
            border: 1px solid #444; background-color: #1a1a1a; 
            color: #fff; box-sizing: border-box; font-size: 0.8rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        #route-search:focus {
            border-color: #0099ff; /* Идэвхжих үед хүрээ нь автобусны цэгтэй адил гоё улбар шар өнгөтэй болно */
        }

        /* 🌟 ШИНЭ: Бүгдийг чекдэх хэсгийн загвар */
        .select-all-container {
            padding: 10px 15px;
            background-color: #202020;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
        }
        .select-all-container input {
            margin-right: 12px;
            transform: scale(1.2);
            cursor: pointer;
        }

        /* Чиглэлийн жагсаалт */
        .route-list { padding: 15px; overflow-y: auto; flex-grow: 1; }

        .route-item { 
            display: flex; align-items: center; margin-bottom: 10px; 
            cursor: pointer; font-size: 0.8rem; 
            line-height: 1.0;
        }
        .route-item input { margin-right: 12px; transform: scale(1.2); cursor: pointer; }

        /* Зүүн ирмэгийн яг голд байрлах Хавчуурга товчлуур */
        .toggle-btn { 
            position: absolute; top: 50%; left: 0; 
            transform: translateY(-50%); z-index: 999; 
            background-color: #0099ff; color: white; border: 1px solid #333; 
            border-left: none; padding: 25px 3px; border-radius: 0 4px 4px 0; 
            cursor: pointer; font-weight: bold; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
            writing-mode: vertical-lr; text-orientation: mixed;
            letter-spacing: 2px; transition: left 0.3s ease;
        }
        .toggle-btn:hover { background-color: #333333; }

        .sidebar.active + .toggle-btn { left: -50px; }

        .error-msg { color: #ff4d4d; padding: 10px; font-size: 0.9rem; }

        @media (max-width: 480px) { 
            .sidebar { width: 85%; left: -85%; }
            .sidebar.active + .toggle-btn { left: -50px; }
        }



/* 1. Зогсоолын Плпап жижиг цонхны үндсэн арын фон болон хүрээг өөрчлөх */
.leaflet-popup-content-wrapper {
    background-color: #333333 !important; /* Хажуугийн цэстэй ижил хар саарал өнгө */
    color: #ffffff !important;            /* Үндсэн бичвэрийг цагаан болгох */
    border-radius: 6px !important;        /* Буланг нь үл ялиг дугуйлах */
    box-shadow: 0 3px 14px rgba(0,0,0,0.5) !important; /* Сүүдрийг илүү тод болгох */
}

/* 2. Цонхны доор байрлах жижиг гурвалжин сумны өнгийг тааруулах */
.leaflet-popup-tip {
    background-color: #333333 !important; /* Сумны арын фоныг цонхтой ижил болгоно */
}

/* 3. Хэрэв доторх текстийн өнгийг нарийвчлах бол (Жишээ нь: "Дайрах чиглэлүүд" гэдэг бичвэр) */
.leaflet-popup-content {
    color: #666666 !important;
    font-family: Arial, sans-serif;
    margin: 12px 15px !important; /* Дотор талын зайг цэгцлэх */
}

/* 4. Цонхыг хаадаг баруун дээд булангийн (X) товчлуурын өнгө */
.leaflet-popup-close-button {
    color: #888888 !important;
}
.leaflet-popup-close-button:hover {
    color: #ff4d4d !important; /* Хулганаа хүргэхэд улаан болно */
}



        
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            АВТОБУСНЫ ЧИГЛЭЛҮҮД
            <button class="close-btn" id="close-btn">×</button>
        </div>
        
        <div class="search-container">
            <input type="text" id="route-search" placeholder="Чиглэл, дугаар, нэрээр хайх...">
        </div>

        <label class="select-all-container" id="select-all-label" style="display: none;">
            <input type="checkbox" id="select-all-checkbox">
            <span>Бүгдийг сонгох</span>
        </label>

        <div class="route-list" id="route-list">Дата уншиж байна...</div>
    </div>

    <button class="toggle-btn" id="toggle-btn"> > </button>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([47.9188, 106.9176], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map); 

        const activeMarkers = {}; 
        let globalData = []; 

        const sidebar = document.getElementById('sidebar'); 
        const toggleBtn = document.getElementById('toggle-btn'); 
        const closeBtn = document.getElementById('close-btn'); 
        const routeListContainer = document.getElementById('route-list'); 
        const searchInput = document.getElementById('route-search');
        
        // 🌟 ШИНЭ: Бүгдийг чеклэх элементийг барьж авах
        const selectAllLabel = document.getElementById('select-all-label');
        const selectAllCheckbox = document.getElementById('select-all-checkbox');

        toggleBtn.addEventListener('click', () => { sidebar.classList.add('active'); });
        closeBtn.addEventListener('click', () => { sidebar.classList.remove('active'); });

        if (searchInput) searchInput.value = '';

        // JSON файлыг унших
        fetch('UB_route_stations.json') 
            .then(response => {
                if (!response.ok) { throw new Error('Файлыг олсонгүй (Статус: ' + response.status + ')'); }
                return response.json(); 
            })
            .then(data => { 
                globalData = data; 
                
                if (!Array.isArray(data) || data.length === 0) {
                    routeListContainer.innerHTML = '<div class="error-msg">Файл дотор дата алга байна.</div>';
                    return;
                }

                const uniqueRoutes = [];
                const distinctAliases = [...new Set(data.map(item => item.routeAlias).filter(Boolean))];
                
                distinctAliases.sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
                
                distinctAliases.forEach(alias => {
                    const routeInfo = data.find(item => item.routeAlias === alias);
                    uniqueRoutes.push({
                        alias: alias,
                        fullName: routeInfo && routeInfo.routeName ? routeInfo.routeName : alias
                    });
                });

                // Одоо дэлгэцэнд харагдаж буй шүүгдсэн чиглэлүүдийг хадгалах массив
                let currentVisibleRoutes = [];

                // Жагсаалтыг зурах функц
                function renderRouteList(filteredRoutes) {
                    routeListContainer.innerHTML = ''; 
                    currentVisibleRoutes = filteredRoutes; // Одоо харагдаж буй чиглэлүүдийг шинэчлэх
                    
                    if (filteredRoutes.length === 0) {
                        routeListContainer.innerHTML = '<div style="color: #888; padding: 10px; font-size: 0.9rem;">Илэрц олдсонгүй...</div>';
                        selectAllLabel.style.display = 'none'; // Илэрц байхгүй бол "Бүгдийг сонгох"-ыг нуух
                        return;
                    }

                    // Дата байна гэвэл "Бүгдийг сонгох" цонхыг харуулна
                    selectAllLabel.style.display = 'flex';

                    // Одоо харагдаж буй бүх чиглэлүүд асаалттай байгаа эсэхийг шалгаж "Бүгдийг сонгох" чекбоксыг тааруулах
                    const allChecked = filteredRoutes.every(route => activeMarkers[route.alias]);
                    selectAllCheckbox.checked = allChecked;

                    filteredRoutes.forEach(route => { 
                        const label = document.createElement('label'); 
                        label.className = 'route-item'; 
                        
                        const checkbox = document.createElement('input'); 
                        checkbox.type = 'checkbox'; 
                        checkbox.className = 'route-checkbox'; // Нийтээр нь удирдах класс нэмэв
                        checkbox.value = route.alias;
                        
                        if (activeMarkers[route.alias]) {
                            checkbox.checked = true;
                        }
                        
                        const text = document.createTextNode(route.fullName); 
                        
                        label.appendChild(checkbox); 
                        label.appendChild(text); 
                        routeListContainer.appendChild(label); 

                        checkbox.addEventListener('change', (e) => { 
                            if (e.target.checked) { 
                                showRouteStations(e.target.value); 
                            } else { 
                                removeRouteStations(e.target.value); 
                            }
                            // Ганц нэгээр нь унтрааж асаах үед "Бүгдийг сонгох" чекбоксын төлөвийг шалгаж шинэчлэх
                            const currentAllChecked = currentVisibleRoutes.every(r => activeMarkers[r.alias]);
                            selectAllCheckbox.checked = currentAllChecked;
                        });
                    });
                }

                // Анхны жагсаалтыг гаргах
                renderRouteList(uniqueRoutes);

                // 🌟 ШИНЭ: "Бүгдийг сонгох" чекбокс дарах үеийн логик
                selectAllCheckbox.addEventListener('change', (e) => {
                    const isChecked = e.target.checked;
                    
                    // Одоо дэлгэцэнд харагдаж буй (шүүгдсэн) автобуснуудаар давтана
                    currentVisibleRoutes.forEach(route => {
                        if (isChecked) {
                            // Хэрэв асаагаагүй байсан бол асааж газрын зурагт нэмнэ
                            if (!activeMarkers[route.alias]) {
                                showRouteStations(route.alias);
                            }
                        } else {
                            // Хэрэв асаалттай байсан бол унтрааж газрын зургаас хасна
                            if (activeMarkers[route.alias]) {
                                removeRouteStations(route.alias);
                            }
                        }
                    });

                    // Дэлгэц дээрх чекбоксуудын тэмдэглэгээг харагдацаар нь шинэчлэх
                    const checkboxes = routeListContainer.querySelectorAll('.route-checkbox');
                    checkboxes.forEach(cb => {
                        cb.checked = isChecked;
                    });
                });

                // Хайлтын логик
                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        const query = e.target.value.toLowerCase().trim();
                        
                        if (query === '') {
                            renderRouteList(uniqueRoutes);
                            return;
                        }
                        
                        const filtered = uniqueRoutes.filter(route => {
                            const aliasMatch = route.alias && route.alias.toLowerCase().includes(query);
                            const nameMatch = route.fullName && route.fullName.toLowerCase().includes(query);
                            return aliasMatch || nameMatch;
                        });
                        
                        renderRouteList(filtered);
                    });
                }
            })
            .catch(error => { 
                console.error(error);
                routeListContainer.innerHTML = `<div class="error-msg">Алдаа: Датаг уншиж чадсангүй.<br>${error.message}</div>`;
            });









        
function showRouteStations(routeAlias) { 
    // Хуучин массив бүтцээс тухайн чиглэлд хамаарах зогсоолуудыг шүүнэ
    const stations = globalData.filter(item => item.routeAlias === routeAlias); 
    activeMarkers[routeAlias] = []; 

    stations.forEach(station => { 
        const lat = parseFloat(station.latitude);
        const lng = parseFloat(station.longitude);

        if (!isNaN(lat) && !isNaN(lng)) { 
            
            // 1. Энэ зогсоол дээр давхцаж буй бүх чиглэлүүдийг хуучин JSON-оос шүүж олох
            const passingRoutesRaw = globalData
                .filter(item => item.stationName === station.stationName)
                .map(item => item.routeAlias);
            
            // Давхардлыг арилгах (жишээ нь: Ч:1, Ч:46, Ү:12)
            const passingRoutes = [...new Set(passingRoutesRaw)];

            // 🌟 ШИНЭ: Чиглэлүүдийг зүгээр л таслалаар тусгаарлаж, нэг мөр текст болгоно
            const routesText = passingRoutes.join(', ');

            // Дугуй маркер үүсгэх тохиргоо (Цагаан хүрээтэй)
            const marker = L.circleMarker([lat, lng], {
                radius: 2,
                fillColor: "#ffff80",
                color: "#000000", 
                weight: 20,
                opacity: 0.0,
                fillOpacity: 1.0,
                className: 'custom-bus-marker'
            });

            // 🌟 ШИНЭЧЛЭГДСЭН: Цагаан цонхны доор шууд 1-2 мөрөөр залгуулаад харуулах бүтэц
            marker.bindPopup(`
                <div style="font-family: Arial, sans-serif; line-height: 1.3; font-size: 0.95rem;">
                    Зогсоол: <b>${station.stationName || 'Нэргүй зогсоол'}</b><br>
                    Чиглэл: <span style="color: #ffffff; font-size: 0.95rem;">${station.routeName || routeAlias}</span>
                    <div style="margin-top: 4px; padding-top: 4px; border-top: 1px solid #ccc; font-size: 0.85rem;">
                        Дайрдаг бусад чиглэл: <span style="color: #ffffff; font-weight: bold;">${routesText}</span>
                    </div>
                </div>
            `);

            marker.addTo(map); 
            activeMarkers[routeAlias].push(marker); 
        }
    });
}









        
        // Зогсоолын цэгүүдийг устгах функц
        function removeRouteStations(routeAlias) { 
            if (activeMarkers[routeAlias]) { 
                activeMarkers[routeAlias].forEach(marker => { 
                    map.removeLayer(marker); 
                });
                delete activeMarkers[routeAlias]; 
            }
        }
    </script>
</body>
</html>
