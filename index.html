// Чиглэлийг рэндэрлэх
function renderRoutes(data) {
    const listContainer = document.getElementById('routeList');
    listContainer.innerHTML = '';
    data.forEach(route => {
        const item = document.createElement('div');
        item.className = 'route-item';
        item.innerHTML = `
            <input type="checkbox" id="chk-${route.code}" value="${route.code}">
            <label class="route-text" for="chk-${route.code}">
                <span class="route-code">${route.code}</span> <span>${route.name}</span>
            </label>
        `;
        listContainer.appendChild(item);
    });
}

// Бодит цагийн шүүлтүүр (Хайлт)
function filterRoutes() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const filtered = routesData.filter(route => {
        const codeMatch = route.code.toLowerCase().includes(query);
        const nameMatch = route.name.toLowerCase().includes(query);
        const cleanNumberQuery = query.replace(/[^\d]/g, '');
        const numberMatch = cleanNumberQuery && route.code.includes(cleanNumberQuery);
        return codeMatch || nameMatch || numberMatch;
    });
    renderRoutes(filtered);
}

        excelData.forEach(function(row) { 
            let lat = row[0]; // Массивын 1 дэх элемент буюу өргөрөг
            let lng = row[1]; // Массивын 2 дахь элемент буюу уртраг
            let rawName = row[2]; // Массивын 3 дахь элемент буюу анхны нэр
            
            // "Цэг 1:", "Цэг 23:" гэх мэт текстийг RegExp (Тогтмол илэрхийлэл) ашиглан хасна
            // /^Цэг\s*\d+\s*:\s*/ гэдэг нь: Мөрийн эхэнд байгаа "Цэг", араас нь ирэх дурын тоо, болон "хоёр цэг"-ийг хоосон зайтай нь хамт устгана гэсэн үг
            let cleanName = rawName.replace(/^Цэг\s*\d+\s*:\s*/i, ''); 

			// 2px диаметртэй харагдах боловч дарах талбай нь том, харагдах нь жижиг цэг
			L.circleMarker([lat, lng], { 
    			radius: 1,           // Цэгний харагдах радиус хэвээрээ (Диаметр 2px)
    			color: '#000000',    // Хүрээний өнгийг чухал биш (Учир нь доор тунгалаг болгоно)
    			opacity: 0.0,        // ЭНД ХҮРЭЭГ ОГТ ХАРАГДАХГҮЙ ҮЛ ҮЗЭГДЭХ БОЛГОНО (0.0 буюу 0%)
    			weight: 20,          // ЭНД ДАРАХ ТАЛБАЙГ ТОМРУУЛЖ БАЙНА! (20px зузаан үл үзэгдэх хүрээ)
    
    			fillColor: '#ffff80',// Цэгийн харагдах доторх өнгө (Шар)
    			fillOpacity: 1.0,    // Доторх өнгө 100% тод харагдана
    
    			interactive: true    // Энэ цэг дээр дарах, хулгана очиход хариу үйлдэл үзүүлэхийг зөвшөөрөх
			})


				
            .bindPopup(cleanName) // Цэвэрлэсэн, зөвхөн "Буудлын нэр"-ийг поп-ап цонхонд холбоно
